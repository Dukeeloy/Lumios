<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIO Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js"></script>
</head>
<body>
  <div class="container">
    <h1>LUMIO</h1>
    <p class="subtitle">Sistema Inteligente de Gestão de Ocupação e Iluminação</p>

    <div class="card">
      <h2>Pessoas no Ambiente</h2>
      <div id="contador" class="contador">0</div>
    </div>

    <div class="card">
      <h2>Status da Iluminação</h2>
      <div id="status" class="status desligada">Desligada</div>
    </div>

    <div class="acoes">
      <button id="btnLigar">Ligar Luz</button>
      <button id="btnZerar">Zerar Contador</button>
    </div>
  </div>
</body>
</html>
